<!DOCTYPE html>
<!-- v3.1 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok LIVE Overlay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}

html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: transparent;
  font-family: 'Orbitron', sans-serif;
}

/* FULL SCREEN ANIMATED BACKGROUND */
#bgCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 1080px; height: 1920px;
  z-index: 0; pointer-events: none;
}

/*
  LAYOUT
  CAM 1  : top     — 480px
  GAP    : middle  — 830px (game/content goes here)
  TICKER : strip   — 110px
  CAM 2  : bottom  — 500px
*/
.zone { position: absolute; left: 0; right: 0; z-index: 5; }
.z-cam1   { top: 0;      height: 480px; }
.z-middle { top: 480px;  height: 830px; }
.z-ticker { top: 1310px; height: 110px;
            background: rgba(0,0,0,0.92);
            border-top: 3px solid rgba(0,255,255,0.8);
            border-bottom: 3px solid rgba(255,0,255,0.8);
            overflow: hidden; display: flex; align-items: center; z-index: 20; }
.z-cam2   { top: 1420px; height: 500px; }

/* CAM BORDERS */
.cb1, .cb2 { position: absolute; inset: 0; pointer-events: none; }
.cb1 { border: 4px solid rgba(0,255,255,0.5); animation: cb1p 2s ease-in-out infinite; }
.cb2 { border: 4px solid rgba(255,0,255,0.5); animation: cb2p 2.4s ease-in-out infinite; }
@keyframes cb1p {
  0%,100% { border-color:rgba(0,255,255,0.3); box-shadow:inset 0 0 60px rgba(0,255,255,0.06); }
  50%      { border-color:rgba(0,255,255,1);   box-shadow:inset 0 0 120px rgba(0,255,255,0.18),0 0 60px rgba(0,255,255,0.4); }
}
@keyframes cb2p {
  0%,100% { border-color:rgba(255,0,255,0.3); box-shadow:inset 0 0 60px rgba(255,0,255,0.06); }
  50%      { border-color:rgba(255,0,255,1);   box-shadow:inset 0 0 120px rgba(255,0,255,0.18),0 0 60px rgba(255,0,255,0.4); }
}
.cb1.hyp { animation: cbh1 0.2s infinite !important; }
.cb2.hyp { animation: cbh2 0.2s infinite !important; }
@keyframes cbh1 { 0%,100%{border-color:#0ff;box-shadow:0 0 100px #0ff,inset 0 0 160px rgba(0,255,255,0.5)} 50%{border-color:#fff} }
@keyframes cbh2 { 0%,100%{border-color:#f0f;box-shadow:0 0 100px #f0f,inset 0 0 160px rgba(255,0,255,0.5)} 50%{border-color:#fff} }

/* corner brackets */
.cb1::before{content:'';position:absolute;top:-4px;left:-4px;width:70px;height:70px;border-top:6px solid #0ff;border-left:6px solid #0ff}
.cb1::after {content:'';position:absolute;bottom:-4px;right:-4px;width:70px;height:70px;border-bottom:6px solid #0ff;border-right:6px solid #0ff}
.cb2::before{content:'';position:absolute;top:-4px;left:-4px;width:70px;height:70px;border-top:6px solid #f0f;border-left:6px solid #f0f}
.cb2::after {content:'';position:absolute;bottom:-4px;right:-4px;width:70px;height:70px;border-bottom:6px solid #f0f;border-right:6px solid #f0f}

/* middle zone border — subtle */
.mbdr {
  position:absolute;inset:0;pointer-events:none;z-index:4;
  border:3px solid rgba(80,120,255,0.2);
  animation:mbp 4s ease-in-out infinite;
}
@keyframes mbp {
  0%,100%{border-color:rgba(80,120,255,0.1)}
  50%{border-color:rgba(160,80,255,0.35)}
}
.mbdr.ev{animation:mbev 0.3s infinite!important}
@keyframes mbev{0%,100%{border-color:rgba(255,200,0,1);box-shadow:0 0 80px rgba(255,200,0,0.6)}50%{border-color:#fff}}

/* TICKER */
.tbar-inner {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  padding: 0 40px;
  opacity:0;
  transition: opacity 0.4s ease;
}
.tbar-inner.visible { opacity:1; }
.tbar-icon { font-size:36px; margin-right:18px; flex-shrink:0; }
.tbar-text {
  font-family:'Orbitron',sans-serif; font-size:36px; font-weight:900;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  letter-spacing:1px;
}
.tbar-name { color:#ffcc00; }
.tbar-msg  { color:#fff; margin-left:12px; }
.tbar-inner.tf .tbar-msg { color:#00ffff; }
.tbar-inner.ts .tbar-msg { color:#cc44ff; }
.tbar-inner.tg .tbar-msg { color:#ffcc00; }
.tbar-inner.tsh .tbar-msg { color:#00ff88; }
.tbar-inner.tr .tbar-msg { color:#ff6666; }
.tbar-inner.tm .tbar-msg { color:#ff88ff; }

/* NOTIFICATION POPUP — center screen */
.notif{position:absolute;top:600px;left:50%;transform:translateX(-50%);width:920px;z-index:200;pointer-events:none;display:none}
.notif.vis{display:block}
.nbox{background:rgba(0,0,0,0.96);border:4px solid #0ff;border-radius:28px;padding:52px 64px;text-align:center;animation:nbi .45s cubic-bezier(.18,.89,.32,1.28)}
@keyframes nbi{0%{opacity:0;transform:scale(0.4)}100%{opacity:1;transform:scale(1)}}
.nbox.cf {border-color:#0ff;box-shadow:0 0 100px rgba(0,255,255,0.7)}
.nbox.cs {border-color:#a0f;box-shadow:0 0 100px rgba(170,0,255,0.7)}
.nbox.cg {border-color:#fc0;box-shadow:0 0 100px rgba(255,200,0,0.7)}
.nbox.csh{border-color:#0f8;box-shadow:0 0 100px rgba(0,255,136,0.7)}
.nbox.cr {border-color:#f44;box-shadow:0 0 120px rgba(255,68,68,0.9)}
.nemo{font-size:110px;display:block;margin-bottom:18px;animation:epop .4s ease}
@keyframes epop{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.nhd{font-family:'Press Start 2P',monospace;font-size:30px;letter-spacing:3px;line-height:1.8;text-transform:uppercase;margin-bottom:14px}
.nhd.cf{color:#0ff;text-shadow:0 0 28px #0ff}.nhd.cs{color:#c4f;text-shadow:0 0 28px #a0f}
.nhd.cg{color:#fc0;text-shadow:0 0 28px #fa0}.nhd.csh{color:#0f8;text-shadow:0 0 28px #0f8}
.nhd.cr{color:#f66;text-shadow:0 0 28px #f22}
.nusr{font-size:52px;font-weight:900;color:#fff;letter-spacing:2px;margin-bottom:10px}
.nsb{font-size:24px;color:rgba(255,255,255,0.45);letter-spacing:1px}

/* FX */
.fxl{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.pt{position:absolute;border-radius:50%;animation:pfly linear forwards}
@keyframes pfly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.1)}}
.cn{position:absolute;width:32px;height:32px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fe4,#fa0);border:2px solid #c80;animation:cbst ease-out forwards}
@keyframes cbst{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(var(--cx),var(--cy)) scale(0.2) rotate(var(--cr))}}
.lb{position:absolute;border-radius:3px;animation:lbst ease-out forwards}
@keyframes lbst{0%{height:0;opacity:1}60%{height:var(--lh);opacity:1}100%{height:var(--lh);opacity:0}}
.ft{position:absolute;font-family:'Press Start 2P',monospace;pointer-events:none;text-shadow:3px 3px 0 rgba(0,0,0,0.95);animation:ftup ease-out forwards;white-space:nowrap;font-weight:900}
@keyframes ftup{0%{opacity:1;transform:translateY(0) scale(1)}30%{opacity:1;transform:translateY(-60px) scale(1.2)}100%{opacity:0;transform:translateY(-260px) scale(0.8)}}
.mr{position:absolute;width:8px;border-radius:3px;animation:mrfl linear forwards}
@keyframes mrfl{0%{opacity:1;transform:translate(0,0) rotate(var(--mrot))}100%{opacity:0;transform:translate(var(--mx),var(--my)) rotate(var(--mrot))}}
.fbst{position:absolute;font-size:90px;animation:fbani ease-out forwards}
@keyframes fbani{0%{opacity:0;transform:scale(0)}40%{opacity:1;transform:scale(1.6)}100%{opacity:0;transform:scale(4)}}
@keyframes shk{0%,100%{transform:translate(0,0)}10%{transform:translate(-10px,-8px)}20%{transform:translate(10px,7px)}30%{transform:translate(-8px,10px)}40%{transform:translate(8px,-8px)}50%{transform:translate(-5px,5px)}60%{transform:translate(5px,-4px)}70%{transform:translate(-3px,5px)}80%{transform:translate(3px,-3px)}90%{transform:translate(-2px,0)}}
.shk{animation:shk .5s ease-in-out}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- CAM 1 — top -->
<div class="zone z-cam1">
  <div class="cb1" id="cb1"></div>
</div>

<!-- MIDDLE — game/content area -->
<div class="zone z-middle">
  <div class="mbdr" id="mbdr"></div>
</div>

<!-- TICKER -->
<div class="zone z-ticker">
  <div class="tbar-inner visible" id="tbar">
    <span class="tbar-icon" id="tbar-icon"></span>
    <span class="tbar-text">
      <span class="tbar-name" id="tbar-name"></span>
      <span class="tbar-msg" id="tbar-msg"></span>
    </span>
  </div>
</div>

<!-- CAM 2 — bottom -->
<div class="zone z-cam2">
  <div class="cb2" id="cb2"></div>
</div>

<!-- NOTIFICATION POPUP -->
<div class="notif" id="notif">
  <div class="nbox" id="nbox">
    <span class="nemo" id="nemo"></span>
    <div class="nhd" id="nhd"></div>
    <div class="nusr" id="nusr"></div>
    <div class="nsb" id="nsb"></div>
  </div>
</div>

<div class="fxl" id="fxl"></div>

<script>
// ══════════════════════════════════════════
//  ANIMATED BACKGROUND — lightning everywhere
// ══════════════════════════════════════════
(function(){
  const cv=document.getElementById('bgCanvas'),ctx=cv.getContext('2d');
  cv.width=1080; cv.height=1920;
  const W=1080,H=1920;

  const PAL=[['#00ffff','#0044ff','#aa00ff'],['#ff00ff','#ff0066','#4400ff'],['#00ff88','#00ccff','#0055ff'],['#ffcc00','#ff4400','#cc00ff']];
  let pi=0,pl=0,cp=PAL[0],tp=PAL[1];
  function lh(a,b,t){const p=parseInt(a.slice(1),16),q=parseInt(b.slice(1),16);return`rgb(${Math.round(((p>>16)&255)+(((q>>16)&255)-((p>>16)&255))*t)},${Math.round(((p>>8)&255)+(((q>>8)&255)-((p>>8)&255))*t)},${Math.round((p&255)+((q&255)-(p&255))*t)})`;}

  const stars=Array.from({length:220},()=>({x:Math.random()*W,y:Math.random()*H,r:.4+Math.random()*2.4,s:.06+Math.random()*.32,tw:Math.random()*Math.PI*2,ts:.015+Math.random()*.04,c:Math.floor(Math.random()*3)}));
  const orbs=Array.from({length:18},()=>({x:Math.random()*W,y:Math.random()*H,r:18+Math.random()*90,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,ph:Math.random()*Math.PI*2,sp:.003+Math.random()*.008,c:Math.floor(Math.random()*3)}));
  const HS=80,hexes=[];
  for(let r=0;r<Math.ceil(H/(HS*1.5))+2;r++)for(let c=0;c<Math.ceil(W/(HS*1.73))+2;c++)hexes.push({x:c*HS*1.73+(r%2?HS*.866:0),y:r*HS*1.5,ph:Math.random()*Math.PI*2,sp:.004+Math.random()*.008});
  function hexP(x,y,r){ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));}ctx.closePath();}
  const streams=Array.from({length:16},(_,i)=>({x:(W/16)*i+Math.random()*40-20,y:Math.random()*H,sp:.5+Math.random()*2.2,len:100+Math.random()*320,w:.8+Math.random()*2.5,c:Math.floor(Math.random()*3),a:.1+Math.random()*.32}));

  // LIGHTNING
  const BOLTS=[];let bT=0;
  function mkBolt(){
    const x=Math.random()*W,sy=Math.random()*H*.8,ey=sy+150+Math.random()*700;
    const segs=[];let cy=sy,cx=x;
    while(cy<ey){const ny=cy+12+Math.random()*45,nx=cx+(Math.random()-.5)*130;segs.push({x1:cx,y1:cy,x2:Math.max(8,Math.min(W-8,nx)),y2:ny});if(Math.random()<.35){const bx=cx+(Math.random()-.5)*180;segs.push({x1:cx,y1:cy,x2:Math.max(8,Math.min(W-8,bx)),y2:Math.min(cy+70+Math.random()*110,ey),br:true});}cy=ny;cx=nx;}
    return{segs,al:.7+Math.random()*.3,life:0,ml:4+Math.random()*14,c:Math.floor(Math.random()*3),w:.5+Math.random()*2.2};
  }
  const ARCS=[];let aT=0;
  function mkArc(){ARCS.push({x:Math.random()*W,y:Math.random()*H,len:25+Math.random()*220,life:0,ml:3+Math.random()*9,c:Math.floor(Math.random()*3),a:.5+Math.random()*.5});}
  const PLASMA=Array.from({length:8},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*1.3,vy:(Math.random()-.5)*1.3,r:5+Math.random()*13,ph:0,c:Math.floor(Math.random()*3)}));

  let scanY=0,T=0,eFlash=0;

  function draw(){
    ctx.clearRect(0,0,W,H);
    pl+=.001;if(pl>=1){pl=0;pi=(pi+1)%PAL.length;cp=PAL[pi];tp=PAL[(pi+1)%PAL.length];}
    const C=[0,1,2].map(i=>lh(cp[i],tp[i],pl));

    // dark bg
    ctx.fillStyle='rgba(1,1,14,0.98)';ctx.fillRect(0,0,W,H);

    // hex grid
    hexes.forEach(h=>{const p=.5+.5*Math.sin(T*h.sp*5+h.ph);ctx.globalAlpha=.015+.03*p;ctx.strokeStyle=C[1];ctx.lineWidth=.8;hexP(h.x,h.y,HS*.88);ctx.stroke();});ctx.globalAlpha=1;

    // streams
    streams.forEach(s=>{s.y+=s.sp;if(s.y>H+s.len)s.y=-s.len;const g=ctx.createLinearGradient(s.x,s.y-s.len,s.x,s.y+s.len);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(.4,C[s.c].replace('rgb(','rgba(').replace(')',',0.27)'));g.addColorStop(.5,C[s.c].replace('rgb(','rgba(').replace(')',',0.8)'));g.addColorStop(.6,C[s.c].replace('rgb(','rgba(').replace(')',',0.27)'));g.addColorStop(1,'rgba(0,0,0,0)');ctx.globalAlpha=s.a;ctx.fillStyle=g;ctx.fillRect(s.x-s.w/2,s.y-s.len,s.w,s.len*2);});ctx.globalAlpha=1;

    // orbs
    orbs.forEach(o=>{o.ph+=o.sp;o.x+=o.vx+Math.sin(o.ph)*.3;o.y+=o.vy+Math.cos(o.ph*.7)*.3;if(o.x<-o.r)o.x=W+o.r;if(o.x>W+o.r)o.x=-o.r;if(o.y<-o.r)o.y=H+o.r;if(o.y>H+o.r)o.y=-o.r;const pulse=.5+.5*Math.sin(o.ph*2);const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);const op=Math.round(55*pulse/255*100)/100;g.addColorStop(0,C[o.c].replace('rgb(','rgba(').replace(')',`,${op})`));g.addColorStop(.4,C[o.c].replace('rgb(','rgba(').replace(')',',0.08)'));g.addColorStop(1,'rgba(0,0,0,0)');ctx.globalAlpha=pulse*.65;ctx.fillStyle=g;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;

    // stars
    stars.forEach(s=>{s.y+=s.s;s.tw+=s.ts;if(s.y>H){s.y=0;s.x=Math.random()*W;}ctx.globalAlpha=.15+.85*(.5+.5*Math.sin(s.tw));ctx.fillStyle=C[s.c];ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;

    // ── LIGHTNING ──
    bT++;if(bT>2&&BOLTS.length<18){BOLTS.push(mkBolt());bT=0;}
    for(let i=BOLTS.length-1;i>=0;i--){const b=BOLTS[i];b.life++;if(b.life>b.ml){BOLTS.splice(i,1);continue;}const fd=b.life<3?b.life/3:Math.max(0,1-(b.life-3)/(b.ml-3));b.segs.forEach(s=>{ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.strokeStyle=C[b.c];ctx.lineWidth=s.br?b.w*.4:b.w*5;ctx.globalAlpha=fd*.1;ctx.stroke();ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.strokeStyle=s.br?C[b.c]:'#fff';ctx.lineWidth=s.br?b.w*.3:b.w;ctx.globalAlpha=fd*b.al*(s.br?.4:1);ctx.stroke();});}ctx.globalAlpha=1;

    // arcs
    aT++;if(aT>4){mkArc();if(Math.random()<.6)mkArc();aT=0;}
    for(let i=ARCS.length-1;i>=0;i--){const a=ARCS[i];a.life++;if(a.life>a.ml){ARCS.splice(i,1);continue;}const fd=a.life<2?a.life/2:Math.max(0,1-(a.life-2)/(a.ml-2));ctx.globalAlpha=fd*a.a;ctx.strokeStyle=C[a.c];ctx.lineWidth=.9;ctx.beginPath();ctx.moveTo(a.x,a.y);let cx2=a.x;while(cx2<a.x+a.len){const st=4+Math.random()*11;ctx.lineTo(cx2+st,a.y+(Math.random()-.5)*20);cx2+=st;}ctx.stroke();}ctx.globalAlpha=1;

    // plasma
    PLASMA.forEach(p=>{p.ph+=.04;p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*5);g.addColorStop(0,C[p.c].replace('rgb(','rgba(').replace(')',',0.8)'));g.addColorStop(.3,C[p.c].replace('rgb(','rgba(').replace(')',',0.2)'));g.addColorStop(1,'rgba(0,0,0,0)');ctx.globalAlpha=.65;ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.r*5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.x,p.y,p.r*.5,0,Math.PI*2);ctx.fill();});

    if(eFlash>0){ctx.fillStyle=`rgba(255,255,255,${eFlash*.08})`;ctx.fillRect(0,0,W,H);eFlash-=.04;}

    // scan line
    scanY+=3;if(scanY>H)scanY=0;
    const sg=ctx.createLinearGradient(0,scanY-60,0,scanY+60);sg.addColorStop(0,'rgba(0,255,255,0)');sg.addColorStop(.5,'rgba(0,255,255,0.05)');sg.addColorStop(1,'rgba(0,255,255,0)');ctx.fillStyle=sg;ctx.fillRect(0,scanY-60,W,120);

    // vignette
    const v=ctx.createRadialGradient(W/2,H/2,400,W/2,H/2,1200);v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,0.6)');ctx.fillStyle=v;ctx.fillRect(0,0,W,H);

    // zone dividers
    [480,1310,1420].forEach((y,i)=>{ctx.strokeStyle=C[i%3];ctx.lineWidth=1.5;ctx.globalAlpha=.3+.3*Math.sin(T*2+i);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();});ctx.globalAlpha=1;

    T+=.016;requestAnimationFrame(draw);
  }
  draw();
  window._bgFlash=()=>{eFlash=1;};
})();


// ══════════════════════════════════════════
//  AUDIO SYSTEM
// ══════════════════════════════════════════
const SFX = {
  follow:    new Audio('follow.mp3'),
  sub:       new Audio('sub.mp3'),
  gift:      new Audio('gift.mp3'),
  share:     new Audio('share.mp3'),
  milestone: new Audio('milestone.mp3'),
};
Object.values(SFX).forEach(a => a.volume = 0.8);

function playSound(name) {
  try {
    SFX[name].currentTime = 0;
    SFX[name].play();
  } catch(e) { console.log('Audio error:', e); }
}

function playFollow() { playSound('follow'); }
function playSub()    { playSound('sub'); }
function playShare()  { playSound('share'); }
function playGift()   { playSound('gift'); }

// ══════════════════════════════════════════
//  TICKER
// ══════════════════════════════════════════
let tbarTimer=null;
function addTicker(type,icon,name,msg){
  const bar=document.getElementById('tbar');
  const ic=document.getElementById('tbar-icon');
  const nm=document.getElementById('tbar-name');
  const ms=document.getElementById('tbar-msg');
  clearTimeout(tbarTimer);
  bar.className='tbar-inner '+type;
  ic.textContent=icon;
  nm.textContent=name;
  ms.textContent=msg;
  bar.classList.add('visible');
  void bar.offsetWidth;
  tbarTimer=setTimeout(()=>{ bar.classList.remove('visible'); },5000);
}

// ══════════════════════════════════════════
//  CONFIG — already set up for you!
// ══════════════════════════════════════════
const CONFIG = {
  INTEGRATION: 'tikfinity',
  TIKFINITY_WS_URL: 'wss://tikfinity.zerody.one/ws/overlay?cid=1019485',
  RELAY_WS_URL: 'ws://localhost:3001',
  NOTIF_DURATION: 4000,
};

// ══════════════════════════════════════════
//  WEBSOCKET
// ══════════════════════════════════════════
let wsState={ws:null,reconnectDelay:2000};
function connect(){
  const url=CONFIG.INTEGRATION==='tikfinity'?CONFIG.TIKFINITY_WS_URL:CONFIG.RELAY_WS_URL;
  try{wsState.ws=new WebSocket(url);}catch(e){scheduleReconnect();return;}
  wsState.ws.onopen=()=>{wsState.reconnectDelay=2000;};
  wsState.ws.onmessage=e=>{try{handleEvent(JSON.parse(e.data));}catch{}};
  wsState.ws.onclose=()=>{scheduleReconnect();};
  wsState.ws.onerror=()=>{};
}
function scheduleReconnect(){setTimeout(()=>{wsState.reconnectDelay=Math.min(wsState.reconnectDelay*1.5,30000);connect();},wsState.reconnectDelay);}

// ══════════════════════════════════════════
//  EVENT ROUTER
// ══════════════════════════════════════════
function handleEvent(raw){
  let type,username,amount,giftName;
  if(CONFIG.INTEGRATION==='tikfinity'){
    type=(raw.type||'').toLowerCase();
    username=raw.data?.username||raw.data?.nickname||'Someone';
    amount=raw.data?.amount||raw.data?.repeatCount||1;
    giftName=raw.data?.giftName||raw.data?.gift?.name||'Gift';
    const map={follow:'follow',subscribe:'sub',gift:'gift',share:'share',like:'like',member:'member',moderatoradded:'mod',roomviewercount:'viewers'};
    type=map[type]||type;
  } else {
    type=(raw.event||'').toLowerCase();
    username=raw.username||raw.nickname||'Someone';
    amount=raw.amount||raw.repeatCount||raw.count||1;
    giftName=raw.giftName||raw.gift||'Gift';
  }
  switch(type){
    case 'follow': onFollow(username); break;
    case 'sub': case 'subscribe': case 'subscription': onSub(username); break;
    case 'gift': onGift(username,giftName,amount); break;
    case 'share': onShare(username); break;
    case 'like': onLike(username,amount); break;
    case 'member': onMember(username); break;
    case 'mod': onMod(username); break;
    case 'raid': case 'host': onRaid(username,amount); break;
  }
}

// ══════════════════════════════════════════
//  FX
// ══════════════════════════════════════════
const fxl=document.getElementById('fxl');
function burst(cx,cy,colors,count){for(let i=0;i<count;i++){const el=document.createElement('div');el.className='pt';const ang=(Math.PI*2*i)/count+Math.random()*.5,dist=70+Math.random()*260,sz=6+Math.random()*16,dur=.6+Math.random()*.7;el.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};--dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist}px;animation-duration:${dur}s;`;fxl.appendChild(el);setTimeout(()=>el.remove(),dur*1000+50);}}
function coins(cx,cy,n){for(let i=0;i<n;i++){const el=document.createElement('div');el.className='cn';const ang=(Math.PI*2*i)/n,dist=55+Math.random()*140,dur=.8+Math.random()*.6;el.style.cssText=`left:${cx-16}px;top:${cy-16}px;--cx:${Math.cos(ang)*dist}px;--cy:${Math.sin(ang)*dist-90}px;--cr:${Math.random()*720}deg;animation-duration:${dur}s;`;fxl.appendChild(el);setTimeout(()=>el.remove(),dur*1000+50);}}
function ltng(x,sy,len){const el=document.createElement('div');el.className='lb';const c=['#0ff','#af0','#f4f','#fc0'][Math.floor(Math.random()*4)];el.style.cssText=`left:${x}px;top:${sy}px;width:8px;--lh:${len}px;animation-duration:0.4s;background:linear-gradient(to bottom,#fff,${c},transparent);box-shadow:0 0 30px ${c};`;fxl.appendChild(el);setTimeout(()=>el.remove(),450);}
function ftxt(text,color,x,y,size){const el=document.createElement('div');el.className='ft';el.textContent=text;el.style.cssText=`left:${x}px;top:${y}px;color:${color};font-size:${size}px;animation-duration:1.9s;`;fxl.appendChild(el);setTimeout(()=>el.remove(),2000);}
function shake(){document.body.classList.remove('shk');void document.body.offsetWidth;document.body.classList.add('shk');setTimeout(()=>document.body.classList.remove('shk'),550);}
function fireworks(){const cs=['#f44','#fc0','#0f8','#0ff','#f8f','#fff'];for(let i=0;i<14;i++){setTimeout(()=>{const el=document.createElement('div');el.className='fbst';el.textContent='✦';el.style.cssText=`left:${60+Math.random()*960}px;top:${200+Math.random()*1100}px;color:${cs[i%cs.length]};animation-duration:${.7+Math.random()*.5}s;`;fxl.appendChild(el);setTimeout(()=>el.remove(),1300);},i*110);}}
function meteors(){for(let i=0;i<22;i++){setTimeout(()=>{const el=document.createElement('div');el.className='mr';const dur=.28+Math.random()*.4,len=90+Math.random()*150;el.style.cssText=`left:${Math.random()*1080}px;top:-20px;height:${len}px;background:linear-gradient(to bottom,#fff,#fa0,transparent);--mx:${(Math.random()-.5)*220}px;--my:${400+Math.random()*900}px;--mrot:${28+Math.random()*32}deg;animation-duration:${dur}s;`;fxl.appendChild(el);setTimeout(()=>el.remove(),dur*1000+50);},i*50);}}


// ══════════════════════════════════════════
//  LIKE MILESTONE SYSTEM
// ══════════════════════════════════════════
let totalLikes = 0;
let lastMilestone = 0;

function checkLikeMilestone(count) {
  totalLikes += count;
  const milestone = Math.floor(totalLikes / 5000) * 5000;
  if (milestone > lastMilestone && milestone > 0) {
    lastMilestone = milestone;
    triggerLikeMilestone(milestone);
  }
}

function triggerLikeMilestone(milestone) {
  playMilestoneSound();

  // ── 0.0s BANG — white flash + lightning wall ──
  flashScreen('#ffffff', 0.95, 150);
  for(let i=0;i<8;i++) setTimeout(()=>ltng(Math.random()*1080,0,1920),i*30);
  shake();

  // ── 0.5s — shockwave + popup slams in ──
  setTimeout(()=>{ shockwave(); showMilestonePopup(milestone); }, 500);
  setTimeout(()=>burst(540,960,['#ffcc00','#ff6600','#fff'],80), 600);

  // ── 1.5s — fireworks left & right ──
  setTimeout(()=>{ fireworks(); shake(); flashScreen('#ff4400',0.3,150); }, 1500);
  setTimeout(()=>burst(150,500,['#ff4444','#ff8800'],40), 1600);
  setTimeout(()=>burst(930,500,['#00ffff','#ff00ff'],40), 1700);

  // ── 2.5s — coin rain ──
  setTimeout(()=>{
    for(let i=0;i<8;i++) setTimeout(()=>coins(100+Math.random()*880,100+Math.random()*400,20),i*80);
    for(let i=0;i<5;i++) setTimeout(()=>ltng(Math.random()*1080,0,1920),i*50);
  }, 2500);

  // ── 3.5s — HALFWAY — massive particle burst ──
  setTimeout(()=>{
    shake();
    flashScreen('#ffffff',0.6,150);
    burst(540,960,['#ff4444','#ffcc00','#00ff88','#00ffff','#ff88ff','#fff'],140);
    shockwave();
    for(let i=0;i<8;i++) setTimeout(()=>ltng(Math.random()*1080,0,1920),i*40);
  }, 3500);

  // ── 4.5s — rolling fireworks ──
  setTimeout(()=>{ fireworks(); setTimeout(fireworks,300); }, 4500);
  setTimeout(()=>flashScreen('#ff6600',0.3,200), 4700);

  // ── 5.5s — coin explosion + lightning wall ──
  setTimeout(()=>{
    for(let i=0;i<10;i++) setTimeout(()=>coins(Math.random()*1080,Math.random()*600,25),i*70);
    for(let i=0;i<10;i++) setTimeout(()=>ltng(i*(1080/10),0,1920),i*50);
    shake();
  }, 5500);

  // ── 6.5s — BUILD TO FINALE ──
  setTimeout(()=>{
    burst(200,300,['#ffcc00','#fff'],50);
    burst(880,300,['#ff4444','#ff88ff'],50);
    burst(540,960,['#00ffff','#fff'],50);
    fireworks();
    shake();
  }, 6500);

  // ── 7.5s FINALE — everything at absolute maximum ──
  setTimeout(()=>{
    flashScreen('#ffffff',1.0,200);
    shake();
    burst(540,960,['#ff4444','#ffcc00','#00ff88','#00ffff','#ff88ff','#fff'],180);
    shockwave(); setTimeout(shockwave,200); setTimeout(shockwave,400);
    for(let i=0;i<12;i++) setTimeout(()=>ltng(Math.random()*1080,0,1920),i*30);
    fireworks(); setTimeout(fireworks,200); setTimeout(fireworks,400);
    for(let i=0;i<12;i++) setTimeout(()=>coins(Math.random()*1080,Math.random()*500,28),i*50);
  }, 7500);
}

function flashScreen(color, opacity, duration) {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;inset:0;background:${color};opacity:${opacity};z-index:9999;pointer-events:none;transition:opacity ${duration}ms ease;`;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; }, 50);
  setTimeout(() => el.remove(), duration + 100);
}

function shockwave() {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(0);
    width:200px;height:200px;border-radius:50%;
    border:8px solid rgba(255,200,0,0.9);
    z-index:9998;pointer-events:none;
    animation:shockwaveAnim 1.2s ease-out forwards;`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

// Add shockwave animation to page
const shockwaveStyle = document.createElement('style');
shockwaveStyle.textContent = `
@keyframes shockwaveAnim {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:1; border-color:rgba(255,200,0,0.9); }
  50%  { transform:translate(-50%,-50%) scale(8); opacity:0.6; border-color:rgba(255,100,0,0.6); }
  100% { transform:translate(-50%,-50%) scale(20); opacity:0; border-color:rgba(255,50,0,0); }
}
@keyframes milestoneIn {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(0.2) rotate(-10deg); }
  60%  { opacity:1; transform:translate(-50%,-50%) scale(1.15) rotate(2deg); }
  100% { opacity:1; transform:translate(-50%,-50%) scale(1) rotate(0deg); }
}
@keyframes milestoneOut {
  0%   { opacity:1; transform:translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-50%) scale(1.3); }
}
@keyframes pulseGlow {
  0%,100% { box-shadow: 0 0 60px rgba(255,200,0,0.8), 0 0 120px rgba(255,100,0,0.4); }
  50%      { box-shadow: 0 0 100px rgba(255,200,0,1), 0 0 200px rgba(255,100,0,0.7); }
}
@keyframes textPulse {
  0%,100% { text-shadow: 0 0 30px #ffcc00, 0 0 60px #ff6600; }
  50%      { text-shadow: 0 0 60px #ffcc00, 0 0 120px #ff6600, 0 0 180px #ff3300; }
}
`;
document.head.appendChild(shockwaveStyle);

function showMilestonePopup(milestone) {
  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed; left:50%; top:50%;
    transform:translate(-50%,-50%) scale(0.2);
    width:900px; z-index:500; pointer-events:none;
    background:rgba(0,0,0,0.97);
    border:5px solid #ffcc00;
    border-radius:24px;
    padding:50px 60px;
    text-align:center;
    animation:milestoneIn 0.6s cubic-bezier(.18,.89,.32,1.28) forwards;
    animation-fill-mode:forwards;
    box-shadow:0 0 80px rgba(255,200,0,0.8), 0 0 160px rgba(255,100,0,0.4);
  `;

  el.innerHTML = `
    <div style="font-size:90px;margin-bottom:16px;animation:textPulse 0.8s infinite">🔥</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:22px;color:#ffcc00;
                letter-spacing:3px;line-height:1.8;text-transform:uppercase;margin-bottom:16px;
                animation:textPulse 0.8s infinite">
      LIKE MILESTONE!
    </div>
    <div style="font-family:'Orbitron',sans-serif;font-size:72px;font-weight:900;
                color:#fff;letter-spacing:4px;margin-bottom:12px;
                text-shadow:0 0 40px #ffcc00, 0 0 80px #ff6600;">
      ${milestone.toLocaleString()}
    </div>
    <div style="font-family:'Press Start 2P',monospace;font-size:16px;color:#ff6600;
                letter-spacing:2px;text-shadow:0 0 20px #ff6600;">
      ❤️ LIKES ❤️
    </div>
    <div style="font-family:'Orbitron',sans-serif;font-size:20px;color:rgba(255,255,255,0.5);
                margin-top:16px;letter-spacing:1px;">
      SNACKHEISTSQUAD IS ON FIRE!
    </div>
  `;

  document.body.appendChild(el);

  // Hold for 4 seconds then fade out
  setTimeout(() => {
    el.style.animation = 'milestoneOut 0.8s ease forwards';
    setTimeout(() => el.remove(), 900);
  }, 4000);
}

function playMilestoneSound() {
  try {
    SFX.milestone.currentTime = 0;
    SFX.milestone.volume = 0.9;
    SFX.milestone.play();
    // Auto stop after 8 seconds so it doesn't play forever
    setTimeout(() => {
      SFX.milestone.pause();
      SFX.milestone.currentTime = 0;
    }, 8500);
  } catch(e) { console.log('Milestone audio error:', e); }
}
